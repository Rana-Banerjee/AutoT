name: Run Python Script every 5 mins

on:
  schedule:
    - cron: '45-59/5 3 * * 1-5'  # Runs from 9:15 AM to 9:30 AM on weekdays
    - cron: '*/5 4-13 * * 1-5'  # Runs every 5 minutes from 10:00 AM to 3:30 PM on weekdays

# on:
#   workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: 3.x
    - name: Run Python script
      env:
        API_KEY: ${{ secrets.TEST_API_KEY }}
      run: python3 monitor.py
    - name: Upload log file
      uses: actions/upload-artifact@v4
      with:
        name: app.log
        path: logs/app.log  # Path to your log file
